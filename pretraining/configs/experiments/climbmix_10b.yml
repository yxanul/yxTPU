name: climbmix_10b
steps: 4769
token_budget: 10000000000
gradient_accumulation_steps: 8
run_dir: runs
seed: 42
log_interval: 1
profile_steps: []
benchmark: false
acknowledge_no_checkpoint: true
checkpoint:
  enabled: false
  destination: null
  save_interval: 0
  async_save: false
  keep: 0
  resume: false
wandb:
  enabled: true
  project: yxtpu-pretrain
  entity: null
  group: climbmix-10b
  tags: [v6e-8, kda-hybrid, climbmix, gpt2-fast, no-checkpoint]
  mode: online
diagnostics:
  enabled: true
  interval: 250
harness_eval:
  enabled: true
  interval: 1250
  tasks:
    - hellaswag
    - piqa
    - arc_easy
    - arc_challenge
    - sciq
    - boolq
    - openbookqa
    - copa
    - commonsense_qa
    - lambada_openai
  batch_size_per_device: 1
  num_fewshot: 0
  limit: null
  use_cache: true
model_overrides:
  remat_policy: save_dot_except_mlp
  kda:
    precision: full_fp32
  loss:
    implementation: tokamax_fused
data_overrides:
  sequence_length: 2048
  per_device_batch_size: 16
