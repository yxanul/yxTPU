name: v4-64
accelerator: v4-64
# v4 slice names count TensorCores (2 per chip) and megacore fuses each
# chip's two cores into one JAX device: v4-64 = 32 chips = 32 devices.
device_count: 32
chips: 32
hosts: 8
mesh: {data: 32, fsdp: 1, tensor: 1, sequence: 1}
libtpu_init_args:
  - --xla_enable_async_all_gather=true
multi_host: true
performance_verified: false
notes: >-
  Eight-host data-parallel slice; the TRC grant's 32-chip on-demand v4 row in
  us-central2-b. On-demand use always requires explicit approval. Flag facts
  measured 2026-07-23: the v5e collective-overlap set compiles here but is
  performance-neutral (step-time floor unchanged on a 200-step A/B), so it
  is deliberately not adopted; the v6e scoped-VMEM flag stays absent; and
  loss.implementation=tokamax_fused cannot be used on v4 at all - tokamax's
  mosaic_tpu linear-CE kernel raises "Not supported on TPU v4".
