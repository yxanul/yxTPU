name: v6e-16
accelerator: v6e-16
device_count: 16
chips: 16
hosts: 2
mesh: {data: 16, fsdp: 1, tensor: 1, sequence: 1}
# Identical to the certified v6e-8 flag set. The scoped-VMEM limit is load-
# bearing for the fused Pallas KDA kernels and the Tokamax fused loss.
libtpu_init_args:
  - --xla_tpu_scoped_vmem_limit_kib=98304
  - --xla_enable_async_all_gather=true
  - --xla_tpu_overlap_compute_collective_tc=true
  - --xla_tpu_enable_async_collective_fusion_multiple_steps=true
  - --xla_tpu_enable_async_collective_fusion=true
  - --xla_tpu_enable_async_collective_fusion_fuse_all_gather=true
multi_host: true
performance_verified: false
notes: >-
  Two-host data-parallel slice; unverified. Keep 2,097,152 tokens/update by
  halving gradient accumulation to 4 at microbatch 16/device. Launch the
  trainer on every worker.
