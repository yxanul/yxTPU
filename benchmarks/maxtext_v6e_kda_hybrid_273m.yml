# KDA/GQA 3:1 hybrid training benchmark for one v6e-8 slice.
#
# This controlled dense model repeats [KDA, KDA, KDA, global attention] four
# times. It follows Kimi Delta Attention's token mixer and NoPE full-attention
# placement, while retaining dense SwiGLU and GQA for a fair comparison with
# the existing single-slice 270M benchmark.
base_config: "../maxtext/src/maxtext/configs/base.yml"

run_name: "v6e8-kda-hybrid-273m-synthetic"
model_name: "default"
hardware: "tpu"
decoder_block: "qwen3_next"

base_emb_dim: 1024
base_num_decoder_layers: 16
base_num_query_heads: 8
base_num_kv_heads: 2
head_dim: 128
base_mlp_dim: 2816
vocab_size: 32768

inhomogeneous_layer_cycle_interval: 4
linear_attention_type: "kda"
hybrid_attention_use_dense_mlp: true

# KDA: eight 128x128 recurrent states, per-channel decay, rank-128 decay and
# output gates, and a four-token fused depthwise QKV convolution.
gdn_num_key_heads: 8
gdn_num_value_heads: 8
gdn_key_head_dim: 128
gdn_value_head_dim: 128
gdn_conv_kernel_dim: 4
gdn_chunk_size: 64
use_qk_norm_in_gdn: true
kda_gate_rank: 128
kda_safe_gate: true
kda_gate_lower_bound: -5.0
# The Pallas/custom-VJP solver is retained as an experimental backend, but its
# measured training throughput is lower than the XLA inverse path on v6e.
kda_use_pallas_blocked_solve: false
# The production-shape fused TPU Pallas forward/backward is the selected path.
# The analytical XLA VJP remains available through its dedicated config.
kda_use_analytical_custom_vjp: false
kda_use_fused_pallas_kernel: true
kda_nope_full_attention: true

mlp_activations: ["silu", "linear"]
fused_mlp: true
fused_qkv: true
normalization_layer_epsilon: 1.0e-5
logits_via_embedding: false
enable_dropout: false

dtype: "bfloat16"
weight_dtype: "float32"
opt_type: "adamw"
adam_b1: 0.9
adam_b2: 0.95
adam_eps: 1.0e-8
adam_weight_decay: 0.1
learning_rate: 3.0e-4
gradient_clipping_threshold: 1.0

max_target_length: 2048
per_device_batch_size: 8
gradient_accumulation_steps: 1
steps: 30

dataset_type: "synthetic"
reuse_example_batch: 1

ici_data_parallelism: 8
ici_fsdp_parallelism: 1

# The four global NoPE GQA layers use Tokamax's Pallas Splash implementation.
attention: "flash"
use_tokamax_splash: true
sa_block_q: 1024
sa_block_q_dkv: 2048
remat_policy: "minimal_with_context"

enable_checkpointing: false
save_checkpoint_on_completion: false
async_checkpointing: false
enable_tensorboard: false
gcs_metrics: false
log_period: 1
profile_periodically_period: -1
report_heartbeat_metric_for_gcp_monitoring: false
report_performance_metric_for_gcp_monitoring: false
enable_gcp_goodput_metrics: false
enable_gcp_step_deviation_metrics: false
