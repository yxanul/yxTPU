# Synthetic pretraining throughput benchmark for one v6e-8 slice.
#
# Trillium is optimized for 256x256 matrix multiplies. All large dimensions
# below are multiples of 256, while the model uses 8 attention heads and a
# batch size that is a multiple of 8.
base_config: "../maxtext/src/maxtext/configs/base.yml"

run_name: "v6e8-llama-272m-synthetic"
model_name: "default"
hardware: "tpu"

# Llama-style dense decoder: 271,606,784 trainable parameters.
decoder_block: "llama2"
base_emb_dim: 1024
base_num_query_heads: 8
base_num_kv_heads: 8
head_dim: 256
base_mlp_dim: 2816
base_num_decoder_layers: 12
vocab_size: 32768
mlp_activations: ["silu", "linear"]
logits_via_embedding: false
normalization_layer_epsilon: 1.0e-5
enable_dropout: false
fused_qkv: true
fused_mlp: true

# Conventional TPU mixed precision: BF16 compute with FP32 master weights and
# an ordinary decoupled-weight-decay AdamW optimizer.
dtype: "bfloat16"
weight_dtype: "float32"
opt_type: "adamw"
adam_b1: 0.9
adam_b2: 0.95
adam_eps: 1.0e-8
adam_weight_decay: 0.1
learning_rate: 3.0e-4
gradient_clipping_threshold: 1.0

# Each chip processes 16 * 2048 = 32,768 tokens per step. On eight chips the
# global step contains 262,144 tokens. The launch script may override these.
max_target_length: 2048
per_device_batch_size: 16
gradient_accumulation_steps: 1
steps: 30

# Random synthetic tokens, with one generated batch reused to remove host input
# overhead from the accelerator throughput measurement.
dataset_type: "synthetic"
reuse_example_batch: 1

# This model and its Adam states fit per chip, so pure data parallelism avoids
# FSDP parameter all-gathers. Gradients are reduced across all eight chips.
ici_data_parallelism: 8
ici_fsdp_parallelism: 1

attention: "flash"
sa_block_q: 1024
sa_block_q_dkv: 2048
sa_block_q_dq: 2048
remat_policy: "minimal_with_context"

# This is a disposable performance run: local metrics only, no checkpoints,
# TensorBoard, profiler uploads, or paid object storage.
enable_checkpointing: false
save_checkpoint_on_completion: false
async_checkpointing: false
enable_tensorboard: false
gcs_metrics: false
log_period: 1
profile_periodically_period: -1
report_heartbeat_metric_for_gcp_monitoring: false
report_performance_metric_for_gcp_monitoring: false
enable_gcp_goodput_metrics: false
enable_gcp_step_deviation_metrics: false
